      speed: 700,
      loop: true,

      pagination: {

        clickable: true,
      },
      breakpoints: {
        980: {
          initialSlide: 0,
          slidesPerView: 3,
          spaceBetween: 80,
          centeredSlides: false,
        },
      },
    });


    window.addEventListener("resize", () => {
      const nowDesktop = window.innerWidth >= 980;
      if (nowDesktop) {
        homeCarouselSwiper.slideToLoop(0, 0);
      }
    });
  </script>
  <script>
    function SquareScrollAni() {
      const rightSquare = document.querySelector(".squareAni .right");
      const leftSquare = document.querySelector(".squareAni .left");
      if (!rightSquare || !leftSquare) return;
      let ticking = false;
      const updateSquare = () => {
        const scrollY = window.scrollY;
        const scale = Math.min(0.1 + scrollY * 0.0005, 1);
        const rotate = Math.min(scrollY * 0.05, 60);


        rightSquare.style.transform = `scale(${scale}) rotate(${-rotate}deg)`;
        leftSquare.style.transform = `scale(${0.5 + scale}) rotate(${300 + rotate}deg)`;
        ticking = false;
      };

      window.addEventListener("scroll", () => {
        if (!ticking) {
          requestAnimationFrame(updateSquare);
          ticking = true;
        }
      },
        { passive: true }
      );

      updateSquare();
    }

    SquareScrollAni();

  </script>
  <!--動畫重置-->
  <script>
    const media = window.matchMedia("(min-width:980px)");

    media.addEventListener("change", () => {
      restartAnimation();
    });
    //動畫重置
    function restartAnimation() {
      document.querySelectorAll(".word .char").forEach(char => {
        char.style.animation = "none";
        void char.offsetWidth;
        char.style.animation = "";
      });
    }
  </script>
